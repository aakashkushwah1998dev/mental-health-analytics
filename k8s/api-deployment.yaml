apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api
  namespace: mental-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
    spec:
      containers:
        - name: ml-api
          image: ghcr.io/owner/mental-health-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mental-health-config
            - secretRef:
                name: mental-health-secrets
