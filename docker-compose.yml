services:
  streamlit_app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}
      MENTAL_HEALTH_API_URL: http://ml_api:8000/predict
      MENTAL_HEALTH_MODEL_INFO_URL: http://ml_api:8000/model-info
      MENTAL_HEALTH_API_KEY: ${MENTAL_HEALTH_API_KEY:-}
    ports:
      - "8501:8501"
    depends_on:
      - ml_api

  ml_api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      MODEL_DIR: /app/models
      MENTAL_HEALTH_API_KEY: ${MENTAL_HEALTH_API_KEY:-}
    ports:
      - "8000:8000"
