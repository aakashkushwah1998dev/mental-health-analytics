name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      USE_SYNTHETIC_TRAINING_DATA: "1"
      SYNTHETIC_TRAINING_DATA_PATH: data/generated/synthetic_assessments.csv
      DB_HOST: localhost
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoring tests
        run: pytest tests/test_scoring.py

      - name: Generate synthetic training data
        run: python scripts/generate_synthetic_training_data.py --rows 2000 --users 300

      - name: Train torch model from synthetic data
        run: python scripts/train_model.py --synthetic-only --auto-generate-synthetic

      - name: Build Streamlit image
        run: docker build -t mental-health-streamlit:ci .

      - name: Build API image
        run: docker build -t mental-health-api:ci -f api/Dockerfile .
